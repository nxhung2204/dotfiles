start-at-login = true

exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace-workspace-change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

accordion-padding = 8

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 2
outer.top = 2
outer.right = 0

[mode.main.binding]

# focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'

# move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'

# fullscreen
alt-f = 'fullscreen'

# layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# open apps
alt-shift-b = "exec-and-forget open -a 'Google Chrome'"
alt-shift-t = "exec-and-forget open -a 'WezTerm'"
alt-shift-s = "exec-and-forget open -a 'Slack'"
alt-shift-c = "exec-and-forget open -a 'Visual Studio Code'"

[[on-window-detected]]
if.app-name-regex-substring = 'Slack'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-name-regex-substring = 'WezTerm'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-name-regex-substring = 'Code'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-name-regex-substring = 'Google Chrome'
run = 'move-node-to-workspace 4'
